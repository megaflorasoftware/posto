name: Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  js:
    name: TypeScript & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm -r --if-present typecheck

      - name: Test
        run: pnpm -r --if-present test

      # Lint + format via Vite+. Informational until the codebase is normalized
      # (`vp check --fix`) and the type-aware lint warnings are triaged; flip
      # `continue-on-error` to false to make it a required gate.
      - name: Install Vite+
        run: |
          curl -fsSL https://vite.plus | bash
          echo "$HOME/.vite-plus/bin" >> "$GITHUB_PATH"

      - name: Lint & format check (Vite+)
        continue-on-error: true
        run: vp check

  rust:
    name: Rust
    runs-on: ubuntu-22.04
    env:
      # No debuginfo in CI — cuts compile time and shrinks the cached target dir.
      CARGO_PROFILE_DEV_DEBUG: 0
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev

      # Version + components come from src-tauri/rust-toolchain.toml (single
      # source of truth, shared with local dev). Installed before the cache so
      # rust-cache keys on the pinned rustc version.
      - name: Install Rust toolchain
        run: rustup show

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Keep the compiled dependency cache even when clippy/tests fail, so a
          # red run doesn't force the next one to recompile everything.
          cache-on-failure: true

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test
